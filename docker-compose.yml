# Development: identical Linux environment on Mac / Windows (Docker Desktop).
# Host source is bind-mounted; node_modules stays inside the container (Linux binaries).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
    ports:
      - "5173:5173"
      - "3001:3001"
    environment:
      # File watching on Docker bind mounts (especially macOS)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

  # Production-style: Express serves dist/ + /api on one port (default 4173 in image)
  app-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "4173:4173"
    volumes:
      - prod_data:/app/data
    environment:
      NODE_ENV: production
      PORT: "4173"
      # Any non-default secret; override via .env or shell (required for real deployment)
      SESSION_SECRET: ${SESSION_SECRET:-astranotes-docker-prod-change-me}

volumes:
  node_modules:
  prod_data:
